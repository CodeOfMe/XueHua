<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学习 - 学话</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <nav class="sidebar">
        <div class="sidebar-header">
            <h1 class="logo">学话</h1>
            <p class="subtitle" data-i18n="app.subtitle">Xuehua 语言学习助手</p>
        </div>
        <ul class="nav-links">
            <li><a href="/" class="nav-link"><span class="nav-icon">🏠</span> <span data-i18n="nav.home">首页</span></a></li>
            <li><a href="/learn" class="nav-link active" data-page="learn"><span class="nav-icon">📚</span> <span data-i18n="nav.learn">学习</span></a></li>
            <li><a href="/review" class="nav-link"><span class="nav-icon">🔄</span> <span data-i18n="nav.review">复习</span></a></li>
            <li><a href="/chat" class="nav-link"><span class="nav-icon">💬</span> <span data-i18n="nav.chat">问答</span></a></li>
            <li><a href="/photo" class="nav-link"><span class="nav-icon">📷</span> <span data-i18n="nav.photo">拍照学</span></a></li>
        </ul>
        <div class="sidebar-section">
            <h3 data-i18n="sidebar.language">学习语言</h3>
            <select id="select-language" class="form-select"></select>
        </div>
        <div class="sidebar-section">
            <h3 data-i18n="sidebar.ui_language">界面语言</h3>
            <select id="select-ui-language" class="form-select"></select>
        </div>
        <div class="sidebar-section">
            <h3 data-i18n="sidebar.level">当前级别</h3>
            <select id="select-level" class="form-select"></select>
        </div>
    </nav>

    <main class="content">
        <div class="learn-container">
            <div class="level-selector">
                <button class="level-btn active" data-level="N5">N5 入门</button>
                <button class="level-btn" data-level="N4">N4 初级</button>
                <button class="level-btn" data-level="N3">N3 中级</button>
                <button class="level-btn" data-level="N2">N2 中高</button>
                <button class="level-btn" data-level="N1">N1 高级</button>
                <button class="level-btn" data-level="">全部</button>
            </div>

            <div class="learn-tabs">
                <button class="tab-btn active" data-tab="domains"><span class="nav-icon">🌐</span> <span data-i18n="learn.tab_vocab">词汇网络</span></button>
                <button class="tab-btn" data-tab="quiz"><span class="nav-icon">✏️</span> <span data-i18n="learn.tab_quiz">测验</span></button>
            </div>

            <div id="tab-domains" class="tab-content active">
                <div id="vocab-list" class="vocab-grid">
                    <div class="loading" data-i18n="kb.browse_loading">加载中...</div>
                </div>
            </div>

            <div id="tab-quiz" class="tab-content">
                <div id="quiz-area">
                    <div class="quiz-start">
                        <p data-i18n="learn.quiz_choose">选择测验类型：</p>
                        <button class="btn btn-primary" onclick="startQuiz('multiple_choice')" data-i18n="learn.quiz_mc">选择题</button>
                        <button class="btn btn-primary" onclick="startQuiz('reading')" data-i18n="learn.quiz_reading">读音测验</button>
                    </div>
                    <div id="quiz-content" class="hidden">
                        <div id="quiz-question" class="quiz-question"></div>
                        <div id="quiz-choices" class="quiz-choices"></div>
                        <div id="quiz-feedback" class="quiz-feedback hidden"></div>
                        <div id="quiz-progress" class="quiz-progress"></div>
                        <button id="btn-next-quiz" class="btn btn-primary hidden" onclick="nextQuiz()">下一题</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="/static/js/i18n.js"></script>
    <script src="/static/js/learn.js"></script>
</body>
</html>
